name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://parkshare:parkshare@localhost:5432/parkshare_ci
      JWT_SECRET: parkshare-ci-jwt-secret
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run ci:lint

      - name: Test
        run: npm run ci:test

      - name: Build
        run: npm run ci:build
