name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        contains(fromJSON('["main", "dev"]'), github.event.workflow_run.head_branch)
      )
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check DockerHub secrets
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN GitHub secrets are required."
            exit 1
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image names
        run: |
          SOURCE_BRANCH="${WORKFLOW_HEAD_BRANCH:-$GITHUB_REF_NAME}"
          SOURCE_SHA="${WORKFLOW_HEAD_SHA:-$GITHUB_SHA}"
          BRANCH_TAG="$(echo "$SOURCE_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g' | sed -E 's/^-+|-+$//g')"
          SHORT_SHA="${SOURCE_SHA::7}"
          BRANCH_TAG="${BRANCH_TAG:0:128}"

          if [ -z "$BRANCH_TAG" ]; then
            BRANCH_TAG="sha-${SHORT_SHA}"
          fi

          echo "BACKEND_IMAGE=${DOCKERHUB_USERNAME}/parkshare-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${DOCKERHUB_USERNAME}/parkshare-frontend" >> "$GITHUB_ENV"
          echo "SOURCE_BRANCH=${SOURCE_BRANCH}" >> "$GITHUB_ENV"
          echo "SOURCE_SHA_SHORT=${SHORT_SHA}" >> "$GITHUB_ENV"

          {
            echo "BACKEND_TAGS<<EOF"
            echo "${DOCKERHUB_USERNAME}/parkshare-backend:${BRANCH_TAG}"
            echo "${DOCKERHUB_USERNAME}/parkshare-backend:sha-${SHORT_SHA}"
            if [ "$SOURCE_BRANCH" = "main" ]; then
              echo "${DOCKERHUB_USERNAME}/parkshare-backend:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

          {
            echo "FRONTEND_TAGS<<EOF"
            echo "${DOCKERHUB_USERNAME}/parkshare-frontend:${BRANCH_TAG}"
            echo "${DOCKERHUB_USERNAME}/parkshare-frontend:sha-${SHORT_SHA}"
            if [ "$SOURCE_BRANCH" = "main" ]; then
              echo "${DOCKERHUB_USERNAME}/parkshare-frontend:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_TAGS }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_TAGS }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: docker
    if: always() && needs.docker.result != 'skipped'

    steps:
      - name: Send CD result
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DOCKER_RESULT: ${{ needs.docker.result }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi

          SOURCE_BRANCH="${WORKFLOW_HEAD_BRANCH:-$GITHUB_REF_NAME}"
          SOURCE_SHA="${WORKFLOW_HEAD_SHA:-$GITHUB_SHA}"
          SOURCE_SHA_SHORT="${SOURCE_SHA::7}"

          if [ "$DOCKER_RESULT" = "success" ]; then
            STATUS="passed"
          else
            STATUS="failed"
          fi

          MESSAGE="ParkShare CD ${STATUS} for ${SOURCE_BRANCH} (${SOURCE_SHA_SHORT}). Docker publish: ${DOCKER_RESULT}. ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD="$(jq -n --arg content "$MESSAGE" '{content: $content}')"

          curl --fail --show-error --retry 3 --retry-delay 5 --max-time 10 \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
