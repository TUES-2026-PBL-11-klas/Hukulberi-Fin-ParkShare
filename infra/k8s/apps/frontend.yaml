apiVersion: apps/v1
kind: Deployment
metadata:
  name: parkshare-frontend
  labels:
    app: parkshare
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parkshare
      component: frontend
  template:
    metadata:
      labels:
        app: parkshare
        component: frontend
    spec:
      containers:
        - name: frontend
          # Replace with the immutable sha-* tag published by the CD workflow.
          image: docker.io/darkata/parkshare-frontend:sha-REPLACE_ME
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: parkshare-frontend
  labels:
    app: parkshare
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: parkshare
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parkshare-frontend
  labels:
    app: parkshare
    component: frontend
spec:
  ingressClassName: traefik
  rules:
    - host: parkshare.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: parkshare-frontend
                port:
                  name: http
