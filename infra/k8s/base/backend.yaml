apiVersion: apps/v1
kind: Deployment
metadata:
  name: parkshare-backend
  labels:
    app: parkshare
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: parkshare
      component: backend
  template:
    metadata:
      labels:
        app: parkshare
        component: backend
    spec:
      containers:
        - name: backend
          image: docker.io/darkata/parkshare-backend:sha-REPLACE_ME
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: parkshare-backend-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: parkshare-backend-secrets
                  key: JWT_SECRET
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: parkshare-backend-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: parkshare-backend-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: FRONTEND_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: parkshare-backend-secrets
                  key: FRONTEND_ORIGIN
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: parkshare-backend
  labels:
    app: parkshare
    component: backend
spec:
  type: ClusterIP
  selector:
    app: parkshare
    component: backend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parkshare-backend
  labels:
    app: parkshare
    component: backend
spec:
  ingressClassName: traefik
  rules:
    - host: api.parkshare.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: parkshare-backend
                port:
                  name: http
