apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: parkshare
    component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parkshare
      component: prometheus
  template:
    metadata:
      labels:
        app: parkshare
        component: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-alert-rules
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: parkshare
    component: prometheus
spec:
  type: ClusterIP
  selector:
    app: parkshare
    component: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
