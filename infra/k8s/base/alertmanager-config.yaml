apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  labels:
    app: parkshare
    component: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: discord-webhook
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 30m

    receivers:
      - name: discord-webhook
        webhook_configs:
          - url: http://alertmanager-discord:9094
