apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  labels:
    app: parkshare
    component: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: parkshare-demo
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 30m

    receivers:
      - name: parkshare-demo
