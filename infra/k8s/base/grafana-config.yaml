apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app: parkshare
    component: grafana
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  labels:
    app: parkshare
    component: grafana
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: ParkShare
        orgId: 1
        folder: ParkShare
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  labels:
    app: parkshare
    component: grafana
data:
  parkshare-overview.json: |
    {
      "title": "ParkShare Overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "type": "stat",
          "title": "Backend Up",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "up{job=\"parkshare-backend\"}", "refId": "A" }]
        },
        {
          "type": "stat",
          "title": "Frontend Up",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "up{job=\"parkshare-frontend\"}", "refId": "A" }]
        }
      ]
    }
