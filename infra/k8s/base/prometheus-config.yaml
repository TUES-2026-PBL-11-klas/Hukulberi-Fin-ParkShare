apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: parkshare
    component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: parkshare-backend
        metrics_path: /metrics
        static_configs:
          - targets:
              - parkshare-backend:80

      - job_name: parkshare-frontend
        metrics_path: /api/metrics
        static_configs:
          - targets:
              - parkshare-frontend:80
