apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: parkshare
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: discord-webhook
      group_by:
        - alertname
        - service
      group_wait: 15s
      group_interval: 5m
      repeat_interval: 2h

    receivers:
      - name: discord-webhook
        webhook_configs:
          - url: http://alertmanager-discord:9094
            send_resolved: true
            max_alerts: 10
